<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORII Calendar Assistant - Web Interface</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Google Sans", "Segoe UI", "Roboto", Arial, sans-serif;
        background: linear-gradient(
          135deg,
          hsl(330 60% 85%) 0%,
          hsl(280 70% 75%) 15%,
          hsl(240 10% 97%) 30%,
          hsl(45 90% 80%) 45%,
          hsl(0 80% 80%) 60%,
          hsl(240 10% 97%) 75%,
          hsl(330 60% 85%) 100%
        );
        background-size: 400% 400%;
        animation: gradient-shift 15s ease infinite;
        min-height: 100vh;
      }

      @keyframes gradient-shift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        text-align: center;
        margin-bottom: 20px;
      }

      .header h1 {
        color: white;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        margin-bottom: 10px;
      }

      .header p {
        color: rgba(255, 255, 255, 0.9);
        margin: 0;
      }

      #chatContainer {
        flex: 1;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .chat-interface {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🗓️ ORII Calendar Assistant</h1>
        <p>AI-powered calendar management - Web Interface</p>
      </div>

      <div id="chatContainer">
        <iframe
          src="../extension/sidebar.html"
          class="chat-interface"
          frameborder="0"
          title="ORII Chat Interface"
        >
        </iframe>
      </div>
    </div>

    <script>
      // Handle messages from the chat iframe
      window.addEventListener("message", function (event) {
        console.log("Web interface received message:", event.data);

        if (event.data.action === "processQuery") {
          // Send query to Flask backend
          processQuery(event.data.query);
        } else if (event.data.action === "authenticate") {
          // Handle authentication
          handleAuthentication();
        } else if (event.data.action === "closeSidebar") {
          // In web interface, we can't really "close", but we can provide feedback
          console.log("Close button clicked in web interface");
        }
      });

      // Process query through Flask backend
      async function processQuery(query) {
        try {
          console.log("Processing query:", query);

          const response = await fetch("/api/query", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              query: query,
              session_id: "web-interface-" + Date.now(),
            }),
          });

          const data = await response.json();
          console.log("Flask response:", data);

          // Send response back to chat interface
          const chatFrame = document.querySelector("iframe");
          if (chatFrame && chatFrame.contentWindow) {
            chatFrame.contentWindow.postMessage(
              {
                action: "queryResponse",
                response: {
                  status: data.status || "success",
                  data: {
                    response: data.response || data.error || "No response",
                  },
                },
              },
              "*"
            );
          }
        } catch (error) {
          console.error("Error processing query:", error);

          // Send error response back to chat interface
          const chatFrame = document.querySelector("iframe");
          if (chatFrame && chatFrame.contentWindow) {
            chatFrame.contentWindow.postMessage(
              {
                action: "queryResponse",
                response: {
                  status: "error",
                  error: "Failed to connect to ORII backend: " + error.message,
                },
              },
              "*"
            );
          }
        }
      }

      // Handle authentication (simplified for web interface)
      function handleAuthentication() {
        // For web interface, we'll assume authentication is handled server-side
        const chatFrame = document.querySelector("iframe");
        if (chatFrame && chatFrame.contentWindow) {
          chatFrame.contentWindow.postMessage(
            {
              action: "authResponse",
              response: {
                status: "success",
              },
            },
            "*"
          );
        }
      }

      // Notify chat interface that it's visible
      window.addEventListener("load", function () {
        setTimeout(() => {
          const chatFrame = document.querySelector("iframe");
          if (chatFrame && chatFrame.contentWindow) {
            chatFrame.contentWindow.postMessage(
              {
                action: "sidebarVisible",
              },
              "*"
            );
          }
        }, 1000);
      });
    </script>
  </body>
</html>
